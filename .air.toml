root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main.exe"
  # If you want to disable automatic Swagger generation, comment out the line below and uncomment the next one:
  # cmd = "go build -o ./tmp/main.exe main.go"
  cmd = "cmd /c \"swag init && go build -o ./tmp/main.exe main.go\""
  delay = 1000
  # Excluded directories. "docs" is excluded to prevent an infinite reload loop when swag init runs.
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "logs", "docs"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "html", "env"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
