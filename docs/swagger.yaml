basePath: /
definitions:
  model.GeneralResponse:
    properties:
      code:
        type: integer
      data: {}
      errors: {}
      message:
        type: string
    type: object
  model.LoginRequest:
    properties:
      identifier:
        type: string
      password:
        type: string
    required:
    - identifier
    - password
    type: object
  model.LoginResponse:
    properties:
      access_token:
        type: string
      permissions:
        additionalProperties: true
        type: object
      refresh_token:
        type: string
      roles:
        items:
          type: string
        type: array
      user:
        $ref: '#/definitions/model.UserDto'
      username:
        type: string
    type: object
  model.ProductCreateOrUpdateModel:
    properties:
      name:
        type: string
      price:
        type: integer
      quantity:
        type: integer
    required:
    - name
    - price
    - quantity
    type: object
  model.ProductModel:
    properties:
      id:
        type: string
      name:
        type: string
      price:
        type: integer
      quantity:
        type: integer
    type: object
  model.RefreshTokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      rotated:
        type: boolean
    type: object
  model.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        maxLength: 50
        minLength: 3
        type: string
      gender:
        enum:
        - male
        - female
        type: string
      last_name:
        maxLength: 50
        type: string
      password:
        maxLength: 50
        minLength: 6
        type: string
      profile_picture_url:
        type: string
      username:
        maxLength: 30
        minLength: 3
        type: string
    required:
    - email
    - first_name
    - password
    - username
    type: object
  model.RegisterResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: string
      last_name:
        type: string
      profile_picture_url:
        type: string
      username:
        type: string
    type: object
  model.TransactionCreateUpdateModel:
    properties:
      id:
        type: string
      total_price:
        type: integer
      transaction_details:
        items:
          $ref: '#/definitions/model.TransactionDetailCreateUpdateModel'
        type: array
    type: object
  model.TransactionDetailCreateUpdateModel:
    properties:
      id:
        type: string
      price:
        type: integer
      product:
        $ref: '#/definitions/model.ProductModel'
      product_id:
        type: string
      quantity:
        type: integer
      sub_total_price:
        type: integer
    required:
    - price
    - product_id
    - quantity
    - sub_total_price
    type: object
  model.UserDto:
    properties:
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: string
      last_name:
        type: string
      profile_picture_url:
        type: string
      status:
        type: string
    type: object
  model.UserProfileResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: string
      last_name:
        type: string
      permissions:
        additionalProperties: true
        type: object
      profile_picture_url:
        type: string
      roles:
        items:
          type: string
        type: array
      status:
        type: string
      username:
        type: string
    type: object
host: localhost:9999
info:
  contact:
    email: fiber@swagger.io
    name: API Support
  description: Baseline project using Go Fiber
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Go Fiber Clean Architecture
  version: 1.0.0
paths:
  /api/v1/authentication/login:
    post:
      consumes:
      - application/json
      description: login a user.
      parameters:
      - description: Login Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.LoginResponse'
              type: object
      summary: login user
      tags:
      - Authentication
  /api/v1/authentication/logout:
    post:
      consumes:
      - application/json
      description: log out user and clear tokens/cookies.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  type: string
              type: object
      security:
      - JWT: []
      summary: logout user
      tags:
      - Authentication
  /api/v1/authentication/refresh:
    post:
      consumes:
      - application/json
      description: refresh access token using refresh token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.RefreshTokenResponse'
              type: object
      security:
      - JWT: []
      summary: refresh token
      tags:
      - Authentication
  /api/v1/authentication/register:
    post:
      consumes:
      - application/json
      description: register a new user.
      parameters:
      - description: Register Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.RegisterResponse'
              type: object
      summary: register user
      tags:
      - Authentication
  /api/v1/users/me:
    get:
      consumes:
      - application/json
      description: gets current user profile based on JWT claim.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.UserProfileResponse'
              type: object
      security:
      - JWT: []
      summary: get profile
      tags:
      - User
  /v1/api/product:
    get:
      consumes:
      - application/json
      description: Get all exists products.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GeneralResponse'
      security:
      - JWT: []
      summary: get all exists products
      tags:
      - Product
    post:
      consumes:
      - application/json
      description: create product.
      parameters:
      - description: Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.ProductCreateOrUpdateModel'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GeneralResponse'
      security:
      - JWT: []
      summary: create product
      tags:
      - Product
  /v1/api/product/{id}:
    delete:
      consumes:
      - application/json
      description: delete one exists product.
      parameters:
      - description: Product Id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GeneralResponse'
      security:
      - JWT: []
      summary: delete one exists product
      tags:
      - Product
    get:
      consumes:
      - application/json
      description: Get one exists product.
      parameters:
      - description: Product Id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GeneralResponse'
      security:
      - JWT: []
      summary: get one exists product
      tags:
      - Product
    put:
      consumes:
      - application/json
      description: update one exists product.
      parameters:
      - description: Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.ProductCreateOrUpdateModel'
      - description: Product Id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GeneralResponse'
      security:
      - JWT: []
      summary: update one exists product
      tags:
      - Product
  /v1/api/transaction:
    get:
      consumes:
      - application/json
      description: Get all exists transaction.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GeneralResponse'
      security:
      - JWT: []
      summary: get all exists transaction
      tags:
      - Transaction
    post:
      consumes:
      - application/json
      description: create transaction.
      parameters:
      - description: Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.TransactionCreateUpdateModel'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GeneralResponse'
      security:
      - JWT: []
      summary: create transaction
      tags:
      - Transaction
  /v1/api/transaction-detail/{id}:
    get:
      consumes:
      - application/json
      description: Get one exists transaction detail.
      parameters:
      - description: Transaction Detail Id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GeneralResponse'
      security:
      - JWT: []
      summary: get one exists transaction detail
      tags:
      - Transaction Detail
  /v1/api/transaction/{id}:
    delete:
      consumes:
      - application/json
      description: delete one exists transaction.
      parameters:
      - description: Transaction Id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GeneralResponse'
      security:
      - JWT: []
      summary: delete one exists transaction
      tags:
      - Transaction
    get:
      consumes:
      - application/json
      description: Get one exists transaction.
      parameters:
      - description: Transaction Id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GeneralResponse'
      security:
      - JWT: []
      summary: get one exists transaction
      tags:
      - Transaction
schemes:
- http
- https
securityDefinitions:
  JWT:
    description: Authorization For JWT
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
