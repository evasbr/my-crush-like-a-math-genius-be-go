basePath: /
definitions:
  model.ActiveQuestionResponse:
    properties:
      isFinished:
        type: boolean
      question:
        $ref: '#/definitions/model.QuestionResponse'
    type: object
  model.AnswerOptionDto:
    properties:
      content:
        type: string
      id:
        type: string
      isCorrect:
        type: boolean
    required:
    - content
    type: object
  model.AttemptDetailDto:
    properties:
      answeredAt:
        type: string
      isCorrect:
        type: boolean
      options:
        items:
          $ref: '#/definitions/model.AnswerOptionDto'
        type: array
      questionContent:
        type: string
      questionId:
        type: string
      selectedAnswerId:
        type: string
    type: object
  model.AttemptSessionResponse:
    properties:
      details:
        items:
          $ref: '#/definitions/model.AttemptDetailDto'
        type: array
      expiresAt:
        type: string
      finishedAt:
        type: string
      id:
        type: string
      requestedQuestions:
        type: integer
      score:
        type: integer
      selectedLevel:
        type: string
      startedAt:
        type: string
      status:
        type: string
      topicId:
        type: string
      topicName:
        type: string
      userId:
        type: string
    type: object
  model.ClassroomMemberResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      role:
        type: string
      user_id:
        type: string
    type: object
  model.ClassroomResponse:
    properties:
      codes:
        type: string
      cover_img:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_external_invite_enable:
        type: boolean
      name:
        type: string
      status:
        type: string
      updated_at:
        type: string
      wallpaper_img:
        type: string
    type: object
  model.CreateAnswerOptionDto:
    properties:
      content:
        type: string
      isCorrect:
        type: boolean
    required:
    - content
    - isCorrect
    type: object
  model.CreateQuestionBatchItem:
    properties:
      content:
        type: string
      options:
        items:
          $ref: '#/definitions/model.CreateAnswerOptionDto'
        minItems: 1
        type: array
      timeLimit:
        minimum: 1
        type: integer
    required:
    - content
    - options
    - timeLimit
    type: object
  model.CreateQuestionBatchRequest:
    properties:
      level:
        enum:
        - easy
        - medium
        - hard
        type: string
      questions:
        items:
          $ref: '#/definitions/model.CreateQuestionBatchItem'
        minItems: 1
        type: array
      topicId:
        type: string
    required:
    - level
    - questions
    - topicId
    type: object
  model.GeneralResponse:
    properties:
      code:
        type: integer
      data: {}
      errors: {}
      message:
        type: string
    type: object
  model.JoinClassroomRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  model.LevelSettingDto:
    properties:
      false_score:
        type: integer
      level:
        enum:
        - easy
        - medium
        - hard
        type: string
      true_score:
        type: integer
    required:
    - level
    type: object
  model.LoginRequest:
    properties:
      identifier:
        type: string
      password:
        type: string
    required:
    - identifier
    - password
    type: object
  model.LoginResponse:
    properties:
      access_token:
        type: string
      permissions:
        additionalProperties: true
        type: object
      refresh_token:
        type: string
      roles:
        items:
          type: string
        type: array
      user:
        $ref: '#/definitions/model.UserDto'
      username:
        type: string
    type: object
  model.QuestionResponse:
    properties:
      content:
        type: string
      createdAt:
        type: string
      id:
        type: string
      level:
        type: string
      options:
        items:
          $ref: '#/definitions/model.AnswerOptionDto'
        type: array
      timeLimit:
        type: integer
      topicId:
        type: string
      updatedAt:
        type: string
    type: object
  model.RefreshTokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      rotated:
        type: boolean
    type: object
  model.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        maxLength: 50
        minLength: 3
        type: string
      gender:
        enum:
        - male
        - female
        type: string
      last_name:
        maxLength: 50
        type: string
      password:
        maxLength: 50
        minLength: 6
        type: string
      username:
        maxLength: 30
        minLength: 3
        type: string
    required:
    - email
    - first_name
    - password
    - username
    type: object
  model.RegisterResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: string
      last_name:
        type: string
      username:
        type: string
    type: object
  model.StartAttemptRequest:
    properties:
      level:
        enum:
        - easy
        - medium
        - hard
        type: string
      requestedQuestions:
        minimum: 1
        type: integer
      topicId:
        type: string
    required:
    - level
    - requestedQuestions
    - topicId
    type: object
  model.SubmitAnswerRequest:
    properties:
      answerId:
        type: string
      attemptSessionId:
        type: string
      questionId:
        type: string
    required:
    - answerId
    - attemptSessionId
    - questionId
    type: object
  model.SubmitAnswerResponse:
    properties:
      correctAnswerId:
        type: string
      isCorrect:
        type: boolean
      isFinished:
        type: boolean
      score:
        type: integer
    type: object
  model.TopicAttemptInfoResponse:
    properties:
      current_attempts:
        type: integer
      level_settings:
        items:
          $ref: '#/definitions/model.TopicAttemptLevelSetting'
        type: array
      max_attempts:
        type: integer
      remaining_attempts:
        type: integer
    type: object
  model.TopicAttemptLevelSetting:
    properties:
      false_score:
        type: integer
      level:
        type: string
      remaining_questions:
        type: integer
      total_questions:
        type: integer
      true_score:
        type: integer
    type: object
  model.TopicResponse:
    properties:
      classroom_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      female_dating_dialog:
        type: string
      female_dating_img:
        type: string
      female_normal_dialog:
        type: string
      female_normal_img:
        type: string
      id:
        type: string
      level_settings:
        items:
          $ref: '#/definitions/model.LevelSettingDto'
        type: array
      male_dating_dialog:
        type: string
      male_dating_img:
        type: string
      male_normal_dialog:
        type: string
      male_normal_img:
        type: string
      max_attempts:
        type: integer
      name:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  model.UpdateQuestionRequest:
    properties:
      content:
        type: string
      options:
        items:
          $ref: '#/definitions/model.AnswerOptionDto'
        minItems: 1
        type: array
      timeLimit:
        minimum: 1
        type: integer
    required:
    - content
    - options
    - timeLimit
    type: object
  model.UserDto:
    properties:
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: string
      last_name:
        type: string
      profile_picture_url:
        type: string
      status:
        type: string
    type: object
  model.UserProfileResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: string
      last_name:
        type: string
      permissions:
        additionalProperties: true
        type: object
      profile_picture_url:
        type: string
      roles:
        items:
          type: string
        type: array
      status:
        type: string
      username:
        type: string
    type: object
host: localhost:9999
info:
  contact:
    email: fiber@swagger.io
    name: API Support
  description: Baseline project using Go Fiber
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Go Fiber Clean Architecture
  version: 1.0.0
paths:
  /api/v1/attempts:
    get:
      consumes:
      - application/json
      description: gets list of attempt sessions for the user.
      parameters:
      - description: Filter by Topic ID
        in: query
        name: topicId
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Limit number
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.AttemptSessionResponse'
                  type: array
              type: object
      security:
      - JWT: []
      summary: attempt history list
      tags:
      - Attempt
  /api/v1/attempts/{id}:
    get:
      consumes:
      - application/json
      description: gets attempt session result/details by ID.
      parameters:
      - description: Attempt Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.AttemptSessionResponse'
              type: object
      security:
      - JWT: []
      summary: get attempt detail
      tags:
      - Attempt
  /api/v1/attempts/{id}/next-question:
    get:
      consumes:
      - application/json
      description: gets the next unanswered question in the attempt session.
      parameters:
      - description: Attempt Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.ActiveQuestionResponse'
              type: object
      security:
      - JWT: []
      summary: get active question
      tags:
      - Attempt
  /api/v1/attempts/start:
    post:
      consumes:
      - application/json
      description: starts a new attempt session.
      parameters:
      - description: Start Attempt Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.StartAttemptRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.AttemptSessionResponse'
              type: object
      security:
      - JWT: []
      summary: start attempt
      tags:
      - Attempt
  /api/v1/attempts/submit-answer:
    post:
      consumes:
      - application/json
      description: submits a single answer option and returns correctness/session
        status.
      parameters:
      - description: Submit Answer Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.SubmitAnswerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.SubmitAnswerResponse'
              type: object
      security:
      - JWT: []
      summary: submit answer
      tags:
      - Attempt
  /api/v1/authentication/login:
    post:
      consumes:
      - application/json
      description: login a user.
      parameters:
      - description: Login Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.LoginResponse'
              type: object
      summary: login user
      tags:
      - Authentication
  /api/v1/authentication/logout:
    post:
      consumes:
      - application/json
      description: log out user and clear tokens/cookies.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  type: string
              type: object
      security:
      - JWT: []
      summary: logout user
      tags:
      - Authentication
  /api/v1/authentication/refresh:
    post:
      consumes:
      - application/json
      description: refresh access token using refresh token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.RefreshTokenResponse'
              type: object
      security:
      - JWT: []
      summary: refresh token
      tags:
      - Authentication
  /api/v1/authentication/register:
    post:
      consumes:
      - application/json
      description: register a new user.
      parameters:
      - description: Register Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.RegisterResponse'
              type: object
      summary: register user
      tags:
      - Authentication
  /api/v1/classrooms:
    get:
      consumes:
      - application/json
      description: list all classrooms.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.ClassroomResponse'
                  type: array
              type: object
      security:
      - JWT: []
      summary: list classrooms
      tags:
      - Classroom
    post:
      consumes:
      - multipart/form-data
      description: create a new classroom.
      parameters:
      - description: Classroom Name
        in: formData
        name: name
        required: true
        type: string
      - description: Description
        in: formData
        name: description
        type: string
      - description: Enable External Invite
        in: formData
        name: is_external_invite_enable
        type: boolean
      - description: Cover image file (JPEG, PNG, WebP, max 1MB)
        in: formData
        name: cover_img
        type: file
      - description: Wallpaper image file (JPEG, PNG, WebP, max 1MB)
        in: formData
        name: wallpaper_img
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.ClassroomResponse'
              type: object
      security:
      - JWT: []
      summary: create classroom
      tags:
      - Classroom
  /api/v1/classrooms/{id}:
    delete:
      consumes:
      - application/json
      description: delete a classroom by UUID.
      parameters:
      - description: Classroom ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  type: string
              type: object
      security:
      - JWT: []
      summary: delete classroom
      tags:
      - Classroom
    get:
      consumes:
      - application/json
      description: get a specific classroom by UUID (user must be a member or admin).
      parameters:
      - description: Classroom ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.ClassroomResponse'
              type: object
      security:
      - JWT: []
      summary: get classroom
      tags:
      - Classroom
    put:
      consumes:
      - multipart/form-data
      description: update an existing classroom.
      parameters:
      - description: Classroom ID
        in: path
        name: id
        required: true
        type: string
      - description: Classroom Name
        in: formData
        name: name
        type: string
      - description: Description
        in: formData
        name: description
        type: string
      - description: Enable External Invite
        in: formData
        name: is_external_invite_enable
        type: boolean
      - description: Status
        in: formData
        name: status
        type: string
      - description: Cover image file (JPEG, PNG, WebP, max 1MB)
        in: formData
        name: cover_img
        type: file
      - description: Wallpaper image file (JPEG, PNG, WebP, max 1MB)
        in: formData
        name: wallpaper_img
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.ClassroomResponse'
              type: object
      security:
      - JWT: []
      summary: update classroom
      tags:
      - Classroom
  /api/v1/classrooms/{id}/members:
    get:
      consumes:
      - application/json
      description: list classroom members.
      parameters:
      - description: Classroom ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.ClassroomMemberResponse'
                  type: array
              type: object
      security:
      - JWT: []
      summary: list classroom members
      tags:
      - Classroom
  /api/v1/classrooms/join:
    post:
      consumes:
      - application/json
      description: join classroom by code.
      parameters:
      - description: Join Classroom Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.JoinClassroomRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.ClassroomResponse'
              type: object
      security:
      - JWT: []
      summary: join classroom
      tags:
      - Classroom
  /api/v1/classrooms/me:
    get:
      consumes:
      - application/json
      description: list user's classrooms.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.ClassroomResponse'
                  type: array
              type: object
      security:
      - JWT: []
      summary: list my classrooms
      tags:
      - Classroom
  /api/v1/questions:
    get:
      consumes:
      - application/json
      description: list all questions.
      parameters:
      - description: Filter by topic ID
        in: query
        name: topicId
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Limit number
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.QuestionResponse'
                  type: array
              type: object
      summary: list questions
      tags:
      - Question
  /api/v1/questions/{id}:
    delete:
      consumes:
      - application/json
      description: delete a question by UUID.
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  type: string
              type: object
      security:
      - JWT: []
      summary: delete question
      tags:
      - Question
    get:
      consumes:
      - application/json
      description: get a specific question by UUID.
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.QuestionResponse'
              type: object
      summary: get question
      tags:
      - Question
    put:
      consumes:
      - application/json
      description: update an existing question and sync its answers.
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Question Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.UpdateQuestionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.QuestionResponse'
              type: object
      security:
      - JWT: []
      summary: update question
      tags:
      - Question
  /api/v1/questions/batch:
    post:
      consumes:
      - application/json
      description: create questions in batch for a topic.
      parameters:
      - description: Create Questions Batch Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateQuestionBatchRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.QuestionResponse'
                  type: array
              type: object
      security:
      - JWT: []
      summary: create questions batch
      tags:
      - Question
  /api/v1/topics:
    get:
      consumes:
      - application/json
      description: list all topics.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Limit number
        in: query
        name: limit
        type: integer
      - description: Filter by Classroom ID
        in: query
        name: classroomId
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.GeneralResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.TopicResponse'
                  type: array
              type: object
      summary: list topics
      tags:
      - Topic
    post:
      consumes:
      - multipart/form-data
      description: create a new topic.
      parameters:
